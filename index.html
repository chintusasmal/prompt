<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Builder</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#6355FF',
            accentHover: '#5244E0'
          }
        }
      }
    }
  </script>
  
  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  
  <style>
    body { 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      background-color: #ffffff; 
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    .animate-slide-in {
      animation: slideInRight 0.4s ease-out forwards;
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const STAGES = [
      { id: 1, name: "Role" },
      { id: 2, name: "Task" },
      { id: 3, name: "Context" },
      { id: 4, name: "Format" },
      { id: 5, name: "Constraints" }
    ];

    // UI Components
    const Chip = ({ label, selected, onClick }) => (
      <button 
        onClick={(e) => { e.preventDefault(); onClick(); }}
        className={`px-4 py-2.5 rounded-full border text-sm font-medium transition-all duration-200 shadow-sm ${
          selected 
            ? 'bg-accent text-white border-accent shadow-accent/20' 
            : 'bg-white text-gray-700 border-gray-200 hover:border-accent/40 hover:bg-gray-50'
        }`}
      >
        {label}
      </button>
    );

    const TextInput = ({ value, onChange, placeholder, isShort }) => {
      const className = "w-full mt-3 p-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-accent/50 focus:border-accent outline-none transition text-sm shadow-sm";
      return isShort ? (
        <input type="text" className={className} placeholder={placeholder} value={value} onChange={(e) => onChange(e.target.value)} />
      ) : (
        <textarea className={`${className} h-28 resize-none`} placeholder={placeholder} value={value} onChange={(e) => onChange(e.target.value)} />
      );
    };

      const App = () => {
      const [stage, setStage] = useState(1);
      const [userApiKey, setUserApiKey] = useState(() => localStorage.getItem('geminiApiKey') || '');
      const [showApiKeyInput, setShowApiKeyInput] = useState(false);
      const [aiResponse, setAiResponse] = useState('');
      const [isStreaming, setIsStreaming] = useState(false);
      const [aiError, setAiError] = useState(null);
      const [answers, setAnswers] = useState({
        // Stage 1
        q1: '', q1Custom: '',
        // Stage 2
        q2: '', q3: '',
        // Stage 3
        q4: '', q4Custom: '', q5: '', q6: '',
        // Stage 4
        q7: '', q8: '',
        // Stage 5
        q9: '', q10: [], q10Custom: ''
      });
      const [refinedPrompt, setRefinedPrompt] = useState(null);
      const [isRefining, setIsRefining] = useState(false);
      const [refineError, setRefineError] = useState(null);

      // ADD YOUR GEMINI API KEY HERE
      const GEMINI_API_KEY = "AIzaSyALkAv_vSgr8MKQ2Wq6mOa1fG0v4KwKg9M";

      // Handlers
      const updateAns = (key, val) => setAnswers(prev => ({ ...prev, [key]: val }));
      
      const toggleQ10 = (val) => {
        setAnswers(prev => {
          const arr = [...prev.q10];
          return arr.includes(val) 
            ? { ...prev, q10: arr.filter(i => i !== val) }
            : { ...prev, q10: [...arr, val] };
        });
      };

      const buildPrompt = () => {
        const q1 = (answers.q1 === 'Custom...' ? answers.q1Custom : answers.q1) || '[Role]';
        const q2 = answers.q2 || '[Action]';
        const q3 = answers.q3 || '[Subject]';
        const q4 = (answers.q4 === 'Custom...' ? answers.q4Custom : answers.q4) || '[Audience]';
        const q5 = answers.q5;
        const q6 = answers.q6 || '[Purpose]';
        const q7 = answers.q7 || '[Format]';
        const q8 = answers.q8 || '[Length]';
        const q9 = answers.q9 || '[Tone]';
        
        // Compile Q10
        let q10arr = [...answers.q10];
        if (answers.q10Custom?.trim()) q10arr.push(answers.q10Custom.trim());
        const q10 = q10arr.length > 0 ? q10arr.join(', ') : '';

        // Template assembly
        const parts = [
          `You are a ${q1}.`,
          `${q2} ${q3}.`,
          `The audience is ${q4}.${q5 ? ' ' + (q5.endsWith('.') ? q5 : q5 + '.') : ''}`,
          `Goal: ${q6}.`,
          `Format the output as ${q7}. Keep the response ${q8}.`,
          `Use a ${q9} tone.${q10 ? ' Avoid: ' + q10 + '.' : ''}`
        ];

        return parts.join('\n');
      };

      const validateStage = () => {
        if (stage === 1) return answers.q1 === 'Custom...' ? answers.q1Custom.trim() !== '' : answers.q1 !== '';
        if (stage === 2) return answers.q2 !== '' && answers.q3.trim() !== '';
        if (stage === 3) return (answers.q4 === 'Custom...' ? answers.q4Custom.trim() !== '' : answers.q4 !== '') && answers.q6 !== '';
        if (stage === 4) return answers.q7 !== '' && answers.q8 !== '';
        if (stage === 5) return answers.q9 !== '';
        return true;
      };

      const nextStage = () => { if (validateStage() && stage < 6) setStage(stage + 1); };
      const prevStage = () => { if (stage > 1) setStage(stage - 1); };
      const reset = () => {
        setStage(1);
        setAnswers({ q1:'', q1Custom:'', q2:'', q3:'', q4:'', q4Custom:'', q5:'', q6:'', q7:'', q8:'', q9:'', q10:[], q10Custom:'' });
      };

      const copyToClipboard = (textToCopy) => {
        navigator.clipboard.writeText(textToCopy || buildPrompt());
        alert('Prompt copied to clipboard!');
      };

      const refineWithAi = async () => {
        if (GEMINI_API_KEY === "AIzaSyD627SRdQdlOkEu8q6qg3kJ-0Tnea6mV1E") {
          alert("Please add your Gemini API Key in the code (line ~115) to use the Refine with AI feature.");
          return;
        }

        setIsRefining(true);
        setRefineError(null);
        
        const originalPrompt = buildPrompt();
        const systemPrompt = `You are an expert AI prompt engineer. Review the following prompt intended for an AI system. 
        Your task is to significantly improve it by making it clearer, more structured, more specific, and highly effective for producing the desired result. 
        Do not change the fundamental goal or constraints, just optimize the phrasing and structure for an LLM. 
        Output ONLY the improved prompt text, with no introductory or concluding remarks.`;

        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              contents: [{
                role: 'user',
                parts: [{ text: `${systemPrompt}\n\nHere is the prompt to improve:\n\n${originalPrompt}` }]
              }],
              generationConfig: {
                temperature: 0.7,
              }
            })
          });

          if (!response.ok) {
            throw new Error(`API returned ${response.status} ${response.statusText}`);
          }

          const data = await response.json();
          if (data.candidates && data.candidates[0]?.content?.parts[0]?.text) {
            setRefinedPrompt(data.candidates[0].content.parts[0].text.trim());
          } else {
            throw new Error("Unexpected response format from Gemini API");
          }
        } catch (error) {
          console.error("Error refining prompt:", error);
          setRefineError(error.message || "Failed to communicate with AI.");
        } finally {
          setIsRefining(false);
        }
      };

      const sendToAiAgent = async () => {
        if (!userApiKey.trim()) {
           setShowApiKeyInput(true);
           return;
        }

        // Save key
        localStorage.setItem('geminiApiKey', userApiKey.trim());
        
        setIsStreaming(true);
        setAiError(null);
        setAiResponse('');
        setShowApiKeyInput(false);

        const promptToSend = refinedPrompt || buildPrompt();

        try {
          // Note: Standard fetch doesn't truly "stream" chunks to the UI by default without 
          // a custom ReadableStream reader, but we can simulate the API call and display 
          // the result or use the standard non-streaming endpoint.
          // Using standard generateContent here for simplicity as true streaming in React requires more complex state handling.
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${userApiKey.trim()}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ role: 'user', parts: [{ text: promptToSend }] }],
              generationConfig: { maxOutputTokens: 2000, temperature: 0.7 }
            })
          });

          if (!response.ok) {
            if (response.status === 400 || response.status === 403) {
                // Clear an invalid key
                localStorage.removeItem('geminiApiKey');
                setUserApiKey('');
                throw new Error("Invalid API Key. Please check your key and try again.");
            }
            throw new Error(`API returned ${response.status} ${response.statusText}`);
          }

          const data = await response.json();
          if (data.candidates && data.candidates[0]?.content?.parts[0]?.text) {
             setAiResponse(data.candidates[0].content.parts[0].text);
          } else {
             throw new Error("Unexpected response format. Please try again.");
          }

        } catch (error) {
          console.error("Error sending to agent:", error);
          setAiError(error.message || "An error occurred while contacting the AI Agent.");
          setShowApiKeyInput(true); // show input again so they can fix it
        } finally {
          setIsStreaming(false);
        }
      };

      return (
        <div className="flex flex-col md:flex-row min-h-screen bg-gray-50 text-slate-800">
          
          {/* LEFT PANEL: Form Stages */}
          {stage < 6 && (
            <div className="w-full md:w-1/2 lg:w-7/12 p-6 md:p-10 lg:p-14 bg-white border-r border-gray-100 flex flex-col h-auto md:h-screen md:overflow-y-auto">
              {/* Header & Progress Info */}
              <div className="mb-10 animate-fade-in">
                <h1 className="text-3xl font-bold tracking-tight text-slate-900 mb-2">Prompt Builder</h1>
                <div className="flex justify-between items-end mb-3">
                  <span className="text-slate-500 font-medium">Stage {stage} of 5: <span className="text-accent">{STAGES[stage-1]?.name}</span></span>
                  <span className="text-sm font-bold text-slate-400">{Math.round((stage/5)*100)}%</span>
                </div>
                <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                  <div className="bg-accent h-full rounded-full transition-all duration-500 ease-out" style={{ width: `${(stage/5)*100}%` }}></div>
                </div>
              </div>

              {/* Questions Container */}
              <div className="flex-1 space-y-10">
                {stage === 1 && (
                  <div key="s1" className="animate-slide-in">
                    <div>
                      <h2 className="text-xl font-semibold mb-4 text-slate-800">What kind of expert should the AI be? <span className="text-red-500">*</span></h2>
                      <div className="flex flex-wrap gap-2.5">
                        {['Marketing expert', 'Software developer', 'Business analyst', 'Teacher/trainer', 'Creative writer', 'Data scientist', 'Custom...'].map(opt => (
                          <Chip key={opt} label={opt} selected={answers.q1 === opt} onClick={() => updateAns('q1', opt)} />
                        ))}
                      </div>
                      {answers.q1 === 'Custom...' && (
                        <div className="animate-fade-in">
                          <TextInput isShort placeholder="e.g. UX Designer, Financial Auditor" value={answers.q1Custom} onChange={(v) => updateAns('q1Custom', v)} />
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {stage === 2 && (
                  <div key="s2" className="animate-slide-in space-y-10">
                    <div>
                      <h2 className="text-xl font-semibold mb-4">Pick the action for your task <span className="text-red-500">*</span></h2>
                      <div className="flex flex-wrap gap-2.5">
                        {['Write', 'Summarize', 'Fix/Debug', 'Explain', 'Compare', 'Create', 'Translate', 'Analyse', 'Generate'].map(opt => (
                          <Chip key={opt} label={opt} selected={answers.q2 === opt} onClick={() => updateAns('q2', opt)} />
                        ))}
                      </div>
                    </div>
                    <div>
                      <h2 className="text-xl font-semibold mb-4">Describe what you want in one sentence <span className="text-red-500">*</span></h2>
                      <TextInput placeholder='e.g. "a product description for our wireless headphones"' value={answers.q3} onChange={(v) => updateAns('q3', v)} />
                    </div>
                  </div>
                )}

                {stage === 3 && (
                  <div key="s3" className="animate-slide-in space-y-10">
                    <div>
                      <h2 className="text-xl font-semibold mb-4">Who is the target audience? <span className="text-red-500">*</span></h2>
                      <div className="flex flex-wrap gap-2.5">
                        {['General public', 'Professionals', 'Students', 'Executives', 'Developers', 'Custom...'].map(opt => (
                          <Chip key={opt} label={opt} selected={answers.q4 === opt} onClick={() => updateAns('q4', opt)} />
                        ))}
                      </div>
                      {answers.q4 === 'Custom...' && (
                        <div className="animate-fade-in">
                          <TextInput isShort placeholder="e.g. Teenagers, Healthcare Workers" value={answers.q4Custom} onChange={(v) => updateAns('q4Custom', v)} />
                        </div>
                      )}
                    </div>
                    <div>
                      <h2 className="text-xl font-semibold mb-4 flex items-center justify-between">
                        Any background info the AI must know? 
                        <span className="text-slate-400 font-normal text-sm bg-slate-100 px-2 py-1 rounded-md">Optional</span>
                      </h2>
                      <TextInput placeholder='e.g. "Our product launched in 2024, targets India market"' value={answers.q5} onChange={(v) => updateAns('q5', v)} />
                    </div>
                    <div>
                      <h2 className="text-xl font-semibold mb-4">What is the goal of this output? <span className="text-red-500">*</span></h2>
                      <div className="flex flex-wrap gap-2.5">
                        {['To inform', 'To persuade', 'To entertain', 'To instruct', 'To solve a problem'].map(opt => (
                          <Chip key={opt} label={opt} selected={answers.q6 === opt} onClick={() => updateAns('q6', opt)} />
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {stage === 4 && (
                  <div key="s4" className="animate-slide-in space-y-10">
                    <div>
                      <h2 className="text-xl font-semibold mb-4">Choose an output format <span className="text-red-500">*</span></h2>
                      <div className="flex flex-wrap gap-2.5">
                        {['Bullet points', 'Numbered list', 'Short paragraphs', 'Table', 'Code block', 'Step-by-step', 'No preference'].map(opt => (
                          <Chip key={opt} label={opt} selected={answers.q7 === opt} onClick={() => updateAns('q7', opt)} />
                        ))}
                      </div>
                    </div>
                    <div>
                      <h2 className="text-xl font-semibold mb-4">How long should the response be? <span className="text-red-500">*</span></h2>
                      <div className="grid grid-cols-1 gap-3">
                        {['Very short (1-3 sentences)', 'Medium (1-2 paragraphs)', 'Detailed (full response)'].map(opt => (
                          <div 
                            key={opt}
                            onClick={() => updateAns('q8', opt)}
                            className={`p-4 rounded-xl border-2 cursor-pointer transition-all duration-200 flex items-center ${
                              answers.q8 === opt 
                                ? 'bg-accent/5 border-accent text-accent' 
                                : 'bg-white border-gray-100 hover:border-gray-200 hover:bg-slate-50'
                            }`}
                          >
                            <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center mr-3 ${answers.q8 === opt ? 'border-accent bg-accent' : 'border-gray-300'}`}>
                              {answers.q8 === opt && <div className="w-2 h-2 bg-white rounded-full"></div>}
                            </div>
                            <span className="font-medium">{opt}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {stage === 5 && (
                  <div key="s5" className="animate-slide-in space-y-10">
                    <div>
                      <h2 className="text-xl font-semibold mb-4">What tone should the AI use? <span className="text-red-500">*</span></h2>
                      <div className="flex flex-wrap gap-2.5">
                        {['Professional', 'Friendly', 'Casual', 'Direct', 'Empathetic', 'Academic'].map(opt => (
                          <Chip key={opt} label={opt} selected={answers.q9 === opt} onClick={() => updateAns('q9', opt)} />
                        ))}
                      </div>
                    </div>
                    <div>
                      <h2 className="text-xl font-semibold mb-4 flex items-center justify-between">
                        Anything the AI should avoid? 
                        <span className="text-slate-400 font-normal text-sm bg-slate-100 px-2 py-1 rounded-md">Optional</span>
                      </h2>
                      <div className="flex flex-wrap gap-2.5 mb-3">
                        {['No jargon', 'No bullet points', 'No examples', 'No repetition'].map(opt => (
                          <button 
                            key={opt}
                            onClick={() => toggleQ10(opt)}
                            className={`px-4 py-2 rounded-full border text-sm transition-all duration-200 flex items-center shadow-sm ${
                              answers.q10.includes(opt) 
                                ? 'bg-red-50 text-red-600 border-red-200 shadow-red-500/10' 
                                : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50'
                            }`}
                          >
                            <i className={`fas fa-${answers.q10.includes(opt) ? 'times' : 'plus'} mr-2 ${answers.q10.includes(opt) ? 'text-red-400' : 'text-gray-400'}`}></i> {opt}
                          </button>
                        ))}
                      </div>
                      <TextInput isShort placeholder="Custom constraint... (e.g. No analogies, Keep sentences under 20 words)" value={answers.q10Custom} onChange={(v) => updateAns('q10Custom', v)} />
                    </div>
                  </div>
                )}
              </div>

              {/* Navigation Controls */}
              <div className="mt-8 pt-6 pb-2 border-t border-gray-100 flex justify-between items-center bg-white md:sticky md:bottom-0 z-10">
                <button 
                  onClick={prevStage} 
                  className={`px-6 py-3 rounded-xl font-medium transition-colors ${stage === 1 ? 'invisible' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-900'}`}
                >
                  <i className="fas fa-arrow-left mr-2"></i> back
                </button>
                <button 
                  onClick={nextStage} 
                  disabled={!validateStage()}
                  className={`px-8 py-3 rounded-xl font-semibold text-white transition-all duration-300 shadow-md flex items-center
                    ${validateStage() 
                      ? 'bg-accent hover:bg-accentHover hover:shadow-accent/40 hover:-translate-y-0.5 active:translate-y-0' 
                      : 'bg-slate-300 text-slate-500 shadow-none cursor-not-allowed hidden md:flex'
                    }`}
                >
                  {stage === 5 ? 'Assemble Prompt' : 'Next Step'} <i className="fas fa-arrow-right ml-2"></i>
                </button>
                {/* Mobile specific disabled state hack for smooth rendering */}
                {!validateStage() && <span className="px-8 py-3 rounded-xl font-semibold bg-slate-200 text-slate-400 md:hidden">Next Step</span>}
              </div>
            </div>
          )}

          {/* RIGHT PANEL: Live Preview / Stage 6 Final Screen */}
          <div className={`${stage === 6 ? 'w-full max-w-4xl mx-auto py-12 md:py-24' : 'w-full md:w-1/2 lg:w-5/12 bg-slate-50 border-t md:border-t-0 border-gray-200'} p-6 md:p-10 flex flex-col justify-center`}>
            
            {stage === 6 && (
              <div className="animate-fade-in text-center mb-10">
                <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-100 text-green-500 mb-6 shadow-xl shadow-green-500/20">
                  <i className="fas fa-check text-4xl"></i>
                </div>
                <h1 className="text-4xl md:text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">Your Prompt is Ready</h1>
                <p className="text-lg text-slate-500 max-w-lg mx-auto">Copy the fully optimized prompt below and paste it into ChatGPT, Claude, Gemini, or any LLM.</p>
              </div>
            )}

            <div className={`w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col transition-all duration-500 ${stage === 6 ? 'border-2 border-accent shadow-accent/20' : 'md:h-[calc(100vh-5rem)] border border-gray-200 md:sticky md:top-10'}`}>
              
              {/* Terminal Header */}
              <div className="bg-slate-900 px-5 py-3.5 flex items-center justify-between border-b border-slate-700">
                <div className="flex items-center space-x-2">
                  <div className="w-3 h-3 rounded-full bg-red-400"></div>
                  <div className="w-3 h-3 rounded-full bg-yellow-400"></div>
                  <div className="w-3 h-3 rounded-full bg-green-400"></div>
                </div>
                <h3 className="font-mono text-sm text-slate-300 flex items-center absolute left-1/2 transform -translate-x-1/2">
                  live_preview.txt
                </h3>
              </div>
              
              {/* Output Content */}
              {stage === 6 ? (
                 <div className="flex-1 overflow-y-auto w-full relative">
                   <div className="p-6 md:p-8 bg-slate-800 text-slate-50 min-h-[300px]">
                      {/* Original Prompt */}
                      <div className={`${refinedPrompt ? 'opacity-50 line-through' : ''} transition-all duration-300`}>
                        <pre className="whitespace-pre-wrap font-mono text-sm md:text-[15px] leading-relaxed">
                          {buildPrompt()}
                        </pre>
                      </div>

                      {/* Loading State */}
                      {isRefining && (
                        <div className="absolute inset-0 bg-slate-800/80 backdrop-blur-sm flex flex-col items-center justify-center z-10">
                          <i className="fas fa-circle-notch fa-spin text-4xl text-accent mb-4"></i>
                          <p className="font-medium text-slate-200 animate-pulse">AI is optimizing your prompt...</p>
                        </div>
                      )}

                      {/* Refined Prompt Result */}
                      {refinedPrompt && !isRefining && (
                        <div className="mt-8 animate-fade-in border-t border-slate-700 pt-8">
                          <div className="inline-flex items-center text-accent text-xs font-bold uppercase tracking-wider mb-4 bg-accent/10 px-3 py-1.5 rounded-full border border-accent/20">
                            <i className="fas fa-wand-magic-sparkles mr-2"></i> AI Optimized Version
                          </div>
                          <pre className="whitespace-pre-wrap font-mono text-sm md:text-[15px] leading-relaxed text-indigo-100">
                            {refinedPrompt}
                          </pre>
                        </div>
                      )}

                      {/* Error State */}
                      {refineError && (
                        <div className="mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl flex items-start text-red-200 text-sm">
                          <i className="fas fa-exclamation-circle text-red-400 mt-0.5 mr-3"></i>
                          <div>
                            <p className="font-semibold text-red-300 mb-1">Failed to refine prompt</p>
                            <p className="opacity-80">{refineError}</p>
                          </div>
                        </div>
                      )}
                      
                      {/* Send to AI Agent UI */}
                      <div className="mt-10 pt-8 border-t border-slate-700">
                         {showApiKeyInput && !aiResponse && !isStreaming ? (
                            <div className="animate-slide-in bg-slate-900/50 p-6 rounded-xl border border-slate-700">
                               <h4 className="text-slate-200 font-semibold mb-2">Enter Gemini API Key</h4>
                               <p className="text-sm text-slate-400 mb-4">You need a valid Gemini API key to run this prompt. It will be saved locally.</p>
                               <div className="flex gap-3">
                                  <input 
                                     type="password" 
                                     value={userApiKey}
                                     onChange={(e) => setUserApiKey(e.target.value)}
                                     placeholder="AIzaSy..."
                                     className="flex-1 bg-slate-800 border-slate-600 rounded-lg px-4 py-2.5 text-slate-200 focus:ring-accent focus:border-accent"
                                  />
                                  <button onClick={sendToAiAgent} className="bg-accent hover:bg-accentHover text-white px-5 py-2.5 rounded-lg font-medium transition whitespace-nowrap">
                                     Send <i className="fas fa-paper-plane ml-1"></i>
                                  </button>
                               </div>
                               {aiError && <p className="text-red-400 text-sm mt-3 border-l-2 border-red-500 pl-3">{aiError}</p>}
                            </div>
                         ) : !aiResponse && !isStreaming ? (
                            <button onClick={sendToAiAgent} className="w-full bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white rounded-xl py-4 font-semibold transition flex items-center justify-center">
                               <i className="fas fa-robot text-accent mr-3 text-lg"></i> Send to AI Agent
                            </button>
                         ) : isStreaming ? (
                            <div className="bg-slate-900/50 p-8 rounded-xl border border-slate-700 flex flex-col items-center">
                               <i className="fas fa-circle-notch fa-spin text-3xl text-accent mb-4"></i>
                               <p className="text-slate-300 font-medium animate-pulse">Waiting for AI Agent...</p>
                            </div>
                         ) : (
                            <div className="animate-fade-in bg-slate-900 rounded-xl border border-slate-700 overflow-hidden shadow-xl">
                               <div className="bg-slate-800 px-5 py-3 flex items-center justify-between border-b border-slate-700">
                                   <div className="flex items-center text-accent text-sm font-bold tracking-wider">
                                       <i className="fas fa-robot mr-2"></i> Agent Response
                                   </div>
                               </div>
                               <div className="p-6 max-h-[400px] overflow-y-auto">
                                   <pre className="whitespace-pre-wrap font-sans text-sm md:text-[15px] text-slate-200 leading-relaxed">
                                      {aiResponse}
                                   </pre>
                               </div>
                               <div className="p-4 bg-slate-800 border-t border-slate-700 flex gap-3 justify-end">
                                   <button onClick={() => setAiResponse('')} className="px-4 py-2 bg-transparent border border-slate-600 hover:bg-slate-700 text-slate-300 rounded font-medium text-sm transition">
                                       Clear
                                   </button>
                                   <button onClick={() => copyToClipboard(aiResponse)} className="px-4 py-2 bg-accent hover:bg-accentHover text-white rounded font-medium text-sm transition flex items-center">
                                       <i className="far fa-copy mr-2"></i> Copy Response
                                   </button>
                               </div>
                            </div>
                         )}
                      </div>
                   </div>
                 </div>
              ) : (
                <div className="p-6 md:p-8 flex-1 overflow-y-auto bg-slate-800 text-slate-50 relative">
                  <pre className="whitespace-pre-wrap font-mono text-sm md:text-[15px] leading-relaxed">
                    {buildPrompt()}
                  </pre>
                </div>
              )}

              {/* Stage 6 Actions */}
              {stage === 6 && (
                <div className="p-6 bg-white border-t border-slate-100 flex flex-wrap gap-4 justify-center items-center">
                  <button onClick={() => copyToClipboard(refinedPrompt || buildPrompt())} className="flex-1 md:flex-none justify-center px-6 py-3.5 bg-accent hover:bg-accentHover text-white rounded-xl font-semibold transition-all shadow-md hover:shadow-lg flex items-center">
                    <i className="far fa-copy mr-2"></i> {refinedPrompt ? 'Copy Refined' : 'Copy text'}
                  </button>
                  {!refinedPrompt && (
                    <button onClick={refineWithAi} disabled={isRefining} className={`flex-1 md:flex-none justify-center px-6 py-3.5 ${isRefining ? 'opacity-70 cursor-not-allowed hidden md:flex' : 'hover:scale-105 hover:shadow-lg hover:shadow-purple-500/20'} bg-gradient-to-r from-purple-500 to-indigo-600 text-white rounded-xl font-semibold transition-all shadow-md flex items-center`}>
                      <i className={`fas ${isRefining ? 'fa-spinner fa-spin' : 'fa-wand-magic-sparkles'} mr-2`}></i> {isRefining ? 'Refining...' : 'Refine with AI'}
                    </button>
                  )}
                  <button onClick={reset} className="flex-1 md:flex-none justify-center px-6 py-3.5 bg-white border-2 border-slate-200 hover:border-slate-300 hover:bg-slate-50 text-slate-700 rounded-xl font-semibold transition-all flex items-center">
                    <i className="fas fa-rotate-right mr-2"></i> Start over
                  </button>
                </div>
              )}
            </div>

            {stage < 6 && (
              <div className="mt-6 text-center text-sm font-medium text-slate-400 flex items-center justify-center animate-pulse">
                <i className="fas fa-circle-notch fa-spin mr-2"></i> Preview updates in real-time
              </div>
            )}
            
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
